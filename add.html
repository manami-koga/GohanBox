<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>食材を追加（詳細）</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header header--with-back">
    <a class="header__back" href="index.html">← 戻る</a>
    <h1 class="header__title">食材を追加</h1>
    <span class="header__spacer" aria-hidden="true"></span>
  </header>

  <main class="main main--form">
    <p id="form-error" class="form-banner" role="alert" hidden></p>

    <form id="add-form" class="form" novalidate>
      <div class="field">
        <label class="field__label" for="name">食材名 <span class="field__required">*</span></label>
        <input class="field__input" type="text" id="name" name="name" maxlength="100" autocomplete="off" required>
        <p id="name-error" class="field__error" aria-live="polite"></p>
      </div>

      <div class="field field--row">
        <div class="field__grow">
          <label class="field__label" for="quantity">残量</label>
          <input class="field__input" type="number" id="quantity" name="quantity" min="0" step="any" inputmode="decimal">
          <p id="quantity-error" class="field__error" aria-live="polite"></p>
        </div>
        <div class="field__unit">
          <label class="field__label" for="unit">単位</label>
          <select class="field__input" id="unit" name="unit"></select>
        </div>
      </div>

      <p class="field__hint">賞味期限と消費期限は、どちらか一方のみ入力できます。</p>

      <div class="field" id="best-before-field">
        <label class="field__label" for="best-before">賞味期限</label>
        <input class="field__input" type="date" id="best-before" name="bestBefore">
        <p id="best-before-error" class="field__error" aria-live="polite"></p>
      </div>

      <div class="field" id="use-by-field">
        <label class="field__label" for="use-by">消費期限</label>
        <input class="field__input" type="date" id="use-by" name="useBy">
        <p id="use-by-error" class="field__error" aria-live="polite"></p>
      </div>

      <div class="field">
        <label class="field__label" for="storage">保管場所</label>
        <select class="field__input" id="storage" name="storage"></select>
      </div>

      <div class="field">
        <label class="field__label" for="purchase-location">購入場所</label>
        <input
          class="field__input"
          type="text"
          id="purchase-location"
          name="purchaseLocation"
          maxlength="100"
          placeholder="例：イオン、業務スーパー"
          autocomplete="off"
        >
        <p id="purchase-location-error" class="field__error" aria-live="polite"></p>
      </div>

      <div class="field">
        <label class="field__label" for="purchase-amount">購入金額</label>
        <div class="field__input-suffix">
          <input
            class="field__input"
            type="number"
            id="purchase-amount"
            name="purchaseAmount"
            min="0"
            step="1"
            inputmode="numeric"
            placeholder="例：298"
          >
          <span class="field__suffix" aria-hidden="true">円</span>
        </div>
        <p id="purchase-amount-error" class="field__error" aria-live="polite"></p>
      </div>

      <div class="field">
        <label class="field__label" for="memo">メモ</label>
        <textarea class="field__input field__textarea" id="memo" name="memo" rows="3"></textarea>
      </div>

      <button type="submit" class="form__submit">保存</button>
    </form>
  </main>

  <script type="module" src="js/add.js"></script>
</body>
</html>
