<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>食材一覧</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="header">
    <h1 class="header__title">食材一覧</h1>
  </header>

  <main class="main">
    <ul id="food-list" class="food-list" hidden></ul>

    <section id="empty-state" class="empty-state" hidden>
      <p class="empty-state__message">食材がまだありません</p>
      <a class="empty-state__action" href="add.html">+ 最初の食材を追加</a>
    </section>

    <section id="error-state" class="error-state" hidden>
      <p class="error-state__message">食材を読み込めませんでした</p>
      <button type="button" id="retry-btn" class="error-state__retry">再読み込み</button>
    </section>
  </main>

  <a class="fab" href="add.html" aria-label="食材を追加">
    <svg class="fab__icon" width="24" height="24" viewBox="0 0 24 24" aria-hidden="true">
      <path fill="currentColor" d="M12 5c.55 0 1 .45 1 1v5h5c.55 0 1 .45 1 1s-.45 1-1 1h-5v5c0 .55-.45 1-1 1s-1-.45-1-1v-5H6c-.55 0-1-.45-1-1s.45-1 1-1h5V6c0-.55.45-1 1-1z"/>
    </svg>
  </a>

  <script type="module" src="js/list.js"></script>
</body>
</html>
